# ---------------------------------------------------------------------
#
# Standard emotes
#
# ---------------------------------------------------------------------

# ---------------------------------------------------------------------
# This is a configuration file.
# Lines starting with a # are ignored, blank lines are also ignored.
# Spaces are allowed only in right values; trailing spaces are considered too!
#
# >>>  Case *is* significant. <<<
#
# Every line is interpreted by an $self->{$par} = $val
# e.g. a line like the following (without the # of course)
#   GREE = Hello World!
# defines member ...->{GREE} and assign the string 'Hello World!' to it.
# ---------------------------------------------------------------------


# ---------------------------------------------------------------------
# 0 bow.UserNoarg           = Ti inchini profondamente.
# 1 bow.RoomNoarg           = $n si inchina profondamente.
# 2 bow.UserFound           = Ti inchini davanti a $M.
# 3 bow.RoomFound           = $n si inchina davanti a $N.
# 4 bow.TargFound           = $n si inchina davanti a te.
# 5 bow.UserAuto            = Ti baci la punta dei piedi.
# 6 bow.RoomAuto            = $n si piega su se stesso e si bacia la punta dei piedi.
# 7 bow.Adverb              = "profondamente". 
# 8 bow.BodyPart            = "".
# ([Ti inchini $v.|$n si inchina $v.|Ti inchini $v davanti a $N.|$n si inchina $v davanti a $N.|$n si inchina $v davanti a te.|Ti baci la punta dei piedi.|$n si piega su se stesso e si bacia la punta dei piedi.|profondamente|])
# ([Ammiri tutti|$n ammira tutti|Ammiri $N.|$n ammira $N.|$n ti ammira|Mi ammiro.|$n ammira $l|||])
# $n -> short, $m -> him/her (lui/lei), 
# $s -> hism/herm (il suo), $f -> hisf/herf (la sua), 
# $l -> himself/herself (se stesso/se stessa), $y -> yourself (te stesso/te stessa)
# $t -> tohim/toher (gli/le), $b -> bhim/bher (lo/la)
# $o -> rilassato/rilassata.
# $v -> avdverb
# $w -> where (body part)

# ---------------------------------------------------------------------

